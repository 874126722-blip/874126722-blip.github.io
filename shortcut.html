<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>图标伪装 - 快捷方式</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .icon-container {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }
        .icon-calculator { background: linear-gradient(135deg, #00BCD4, #0097A7); }
        .icon-calendar { background: linear-gradient(135deg, #E53935, #C62828); }
        .icon-notes { background: linear-gradient(135deg, #FFD54F, #FFA000); }
        .icon-clock { background: linear-gradient(135deg, #1565C0, #0D47A1); }
        .icon-weather { background: linear-gradient(135deg, #4FC3F7, #0288D1); }
        .icon-camera { background: linear-gradient(135deg, #424242, #212121); }
        .icon-browser { background: linear-gradient(135deg, #1E88E5, #1565C0); }
        .icon-music { background: linear-gradient(135deg, #7E57C2, #5E35B1); }
        
        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
            text-align: center;
        }
        .action-btn {
            background: #2196F3;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 16px;
        }
        .action-btn:hover { background: #1976D2; }
        .action-btn:active { transform: scale(0.98); }
        
        .tip {
            color: #888;
            font-size: 12px;
            text-align: center;
            line-height: 1.6;
            margin-top: 24px;
            padding: 16px;
            background: #f5f5f5;
            border-radius: 8px;
            max-width: 300px;
        }
        
        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2196F3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <p>正在启动应用...</p>
    </div>
    
    <div class="icon-container" id="shortcutIcon"></div>
    <h1 id="shortcutTitle">图标伪装</h1>
    <p class="subtitle">点击下方按钮尝试启动应用</p>
    
    <button class="action-btn" onclick="launchApp()">启动应用</button>
    
    <div class="tip">
        提示：请将此网页添加到桌面，<br>
        点击桌面图标即可快速启动目标应用
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const packageName = params.get('package');
        const iconType = params.get('icon') || 'calculator';
        const appName = params.get('name') || '快捷方式';
        
        const iconMap = {
            calculator: { emoji: '🧮', class: 'icon-calculator', label: '计算器' },
            calendar: { emoji: '📅', class: 'icon-calendar', label: '日历' },
            notes: { emoji: '📝', class: 'icon-notes', label: '备忘录' },
            clock: { emoji: '⏰', class: 'icon-clock', label: '时钟' },
            weather: { emoji: '☀️', class: 'icon-weather', label: '天气' },
            camera: { emoji: '📷', class: 'icon-camera', label: '相机' },
            browser: { emoji: '🌐', class: 'icon-browser', label: '浏览器' },
            music: { emoji: '🎵', class: 'icon-music', label: '音乐' }
        };
        
        const iconInfo = iconMap[iconType] || iconMap.calculator;
        
        document.getElementById('shortcutIcon').className = 'icon-container ' + iconInfo.class;
        document.getElementById('shortcutIcon').textContent = iconInfo.emoji;
        document.getElementById('shortcutTitle').textContent = appName;
        
        function launchApp() {
            if (!packageName) {
                alert('请指定包名');
                return;
            }
            
            const loading = document.getElementById('loading');
            loading.classList.remove('hidden');
            
            const schemes = [
                `intent://#Intent;action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;package=${packageName};launchFlags=0x10000000;end`,
                `package:${packageName}`,
                `market://details?id=${packageName}`
            ];
            
            schemes.forEach((scheme, index) => {
                setTimeout(() => {
                    try {
                        window.location.href = scheme;
                    } catch (e) {}
                }, index * 500);
            });
            
            setTimeout(() => {
                loading.classList.add('hidden');
            }, 2000);
        }
        
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 500);
            
            if (packageName) {
                setTimeout(launchApp, 800);
            }
        });
    </script>
</body>
</html>
