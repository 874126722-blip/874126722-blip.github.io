<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>图标伪装 - 快捷方式</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .icon-container {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }
        .icon-calculator { background: linear-gradient(135deg, #00BCD4, #0097A7); }
        .icon-calendar { background: linear-gradient(135deg, #E53935, #C62828); }
        .icon-notes { background: linear-gradient(135deg, #FFD54F, #FFA000); }
        .icon-clock { background: linear-gradient(135deg, #1565C0, #0D47A1); }
        .icon-weather { background: linear-gradient(135deg, #4FC3F7, #0288D1); }
        .icon-camera { background: linear-gradient(135deg, #424242, #212121); }
        .icon-browser { background: linear-gradient(135deg, #1E88E5, #1565C0); }
        .icon-music { background: linear-gradient(135deg, #7E57C2, #5E35B1); }
        
        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
            text-align: center;
        }
        .action-btn {
            background: #2196F3;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 16px;
        }
        .action-btn:hover { background: #1976D2; }
        .action-btn:active { transform: scale(0.98); }
        
        .tip {
            color: #888;
            font-size: 12px;
            text-align: center;
            line-height: 1.6;
            margin-top: 24px;
            padding: 16px;
            background: #f5f5f5;
            border-radius: 8px;
            max-width: 300px;
        }
        
        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2196F3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <p>正在启动应用...</p>
    </div>
    
    <div class="icon-container" id="shortcutIcon"></div>
    <h1 id="shortcutTitle">图标伪装</h1>
    <p class="subtitle">点击下方按钮尝试启动应用</p>
    
    <button class="action-btn" onclick="launchApp()">显示启动方式</button>
    
    <div id="schemeList" style="width: 100%; max-width: 320px; margin-top: 16px;"></div>
    
    <div id="manualInput" style="display: none; width: 100%; max-width: 320px; margin-top: 16px;">
        <input type="text" id="packageInput" placeholder="输入包名手动启动" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; outline: none;">
        <button class="action-btn" onclick="manualLaunch()" style="width: 100%; margin-top: 10px;">显示启动方式</button>
    </div>
    
    <div id="schemeInput" style="display: none; width: 100%; max-width: 320px; margin-top: 16px;">
        <input type="text" id="schemeInputField" placeholder="输入URL Scheme，如：deepseek://" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; outline: none;">
        <button class="action-btn" onclick="tryCustomScheme()" style="width: 100%; margin-top: 10px;">尝试此Scheme</button>
        <p style="font-size: 12px; color: #666; margin-top: 8px;">常见格式：应用名:// 或 包名最后部分://</p>
    </div>
    
    <p id="launchTip" class="tip" style="margin-top: 16px; margin-bottom: 16px;"></p>
    
    <div class="tip">
        提示：请将此网页添加到桌面，<br>
        点击桌面图标即可快速启动目标应用
    </div>
    
    <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 10px;">
        <button class="action-btn" onclick="toggleManualInput()" style="background: #f5f5f5; color: #333;">
            找不到应用？手动输入包名
        </button>
        <button class="action-btn" onclick="toggleSchemeInput()" style="background: #fff3e0; color: #e65100;">
            尝试自定义URL Scheme
        </button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const packageName = params.get('package');
        const iconType = params.get('icon') || 'calculator';
        const appName = params.get('name') || '快捷方式';
        
        const iconMap = {
            calculator: { emoji: '🧮', class: 'icon-calculator', label: '计算器' },
            calendar: { emoji: '📅', class: 'icon-calendar', label: '日历' },
            notes: { emoji: '📝', class: 'icon-notes', label: '备忘录' },
            clock: { emoji: '⏰', class: 'icon-clock', label: '时钟' },
            weather: { emoji: '☀️', class: 'icon-weather', label: '天气' },
            camera: { emoji: '📷', class: 'icon-camera', label: '相机' },
            browser: { emoji: '🌐', class: 'icon-browser', label: '浏览器' },
            music: { emoji: '🎵', class: 'icon-music', label: '音乐' }
        };
        
        const iconInfo = iconMap[iconType] || iconMap.calculator;
        
        document.getElementById('shortcutIcon').className = 'icon-container ' + iconInfo.class;
        document.getElementById('shortcutIcon').textContent = iconInfo.emoji;
        document.getElementById('shortcutTitle').textContent = appName;
        
        function launchApp() {
            if (!packageName) {
                alert('请指定包名');
                return;
            }
            
            launchWithPackage(packageName);
        }

        function launchWithPackage(pkg) {
            const loading = document.getElementById('loading');
            loading.classList.remove('hidden');

            const appSchemes = {
                'org.telegram.messenger.web': ['tg://', 'telegram://'],
                'org.telegram.messenger': ['tg://', 'telegram://'],
                'com.tencent.mm': ['weixin://', 'wechat://'],
                'com.tencent.mobileqq': ['mqq://', 'qq://'],
                'com.alipay.mobile': ['alipays://', 'alipay://'],
                'com.taobao.taobao': ['taobao://', 'taobaoweb://'],
                'com.taobao.idlefish': ['fleamarket://'],
                'com.tmall.wireless': ['tmall://'],
                'com.ss.android.ugc.aweme': ['snssdk1128://', 'snssdk://'],
                'com.ss.android.ugc.aweme.lite': ['snssdk1128://'],
                'com.xingin.xhs': ['xhsdiscover://', 'xhs://'],
                'com.sina.weibo': ['sinaweibo://', 'weibo://'],
                'com.eg.android.AlipayGphone': ['alipays://'],
                'com.jingdong.app.mall': ['openapp.jdmobile://', 'jd://'],
                'com.zhihu.android': ['zhihu://'],
                'tv.danmaku.bili': ['bilibili://', 'bilidetail://'],
                'com.smile.gifmaker': ['kwai://', 'snssdk1128://'],
                'com.kuaishou.nebula': ['kwai://'],
                'com.baidu.searchbox': ['baiduboxapp://', 'baidu://'],
                'com.autonavi.minimap': ['androidamap://', 'amap://'],
                'com.baidu.BaiduMap': ['baidumap://'],
                'com.sankuai.meituan': ['imeituan://', 'meituan://'],
                'com.dianping.v1': ['dianping://'],
                'com.sdu.didi.psnger': ['OneTravel://', 'diditaxi://'],
                'com.MobileTicket': ['cn.12306://', 'ctrip://'],
                'com.netease.cloudmusic': ['orpheus://', 'neteasecloudmusic://'],
                'com.tencent.qqmusic': ['qqmusic://'],
                'com.kugou.android': ['kugou://', 'kugouplayer://'],
                'cn.kuwo.player': ['kwmusic://', 'kuwo://'],
                'com.netease.mail': ['mailmaster://', 'netease://'],
                'cn.wps.moffice_eng': ['wpsmoffice://', 'wps://'],
                'com.alibaba.android.rimet': ['dingtalk://'],
                'com.tencent.wework': ['wxwork://'],
                'com.ss.android.lark': ['sslocal://', 'lark://'],
                'com.xunmeng.pinduoduo': ['pinduoduo://', 'yangkeduo://'],
                'com.bytedance.tiktok': ['snssdk1128://', 'tiktok://'],
                'com.google.android.youtube': ['vnd.youtube://', 'youtube://'],
                'com.google.android.apps.maps': ['geo://', 'googlemaps://'],
                'com.google.android.gm': ['mailto://', 'gmail://'],
                'com.google.android.calendar': ['calendar://'],
                'com.google.android.apps.docs': ['docs://', 'drive://'],
                'com.google.android.apps.photos': ['photos://'],
                'com.google.android.apps.translate': ['translate://'],
                'com.google.android.apps.messaging': ['sms://'],
                'com.google.android.apps.chromecast.app': ['chromecast://'],
                'com.google.android.apps.inbox': ['inbox://'],
                'com.google.android.apps.walletnfcrel': ['pay://'],
                'com.google.android.apps.youtube.music': ['music.youtube.com://'],
                'com.google.android.apps.tachyon': ['meet://'],
                'com.google.android.apps.clips': ['clips://'],
                'com.hunantv.imgo.activity': ['mgtv://', 'hitv://'],
                'com.iflytek.inputmethod': ['iflytek://'],
                'com.baidu.input': ['baiduinput://'],
                'com.sohu.sohuvideo': ['sohuvideo://'],
                'com.youku.phone': ['youku://'],
                'com.qiyi.video': ['iqiyi://'],
                'com.tencent.qqlive': ['tenvideo://', 'qqlive://'],
                'com.chinamobile.main.cloudvideo': ['cmvideo://'],
                'com.cn21.mediacloud': ['mediacloud://'],
                'com.huawei.himovie': ['huaweivideo://'],
                'com.huawei.music': ['huaweimusic://'],
                'com.miui.player': ['miuimusic://'],
                'com.miui.video': ['miuivideo://'],
                'com.miui.calculator': ['miuicalculator://'],
                'com.miui.notes': ['miuinotes://'],
                'com.miui.weather2': ['miuiweather://'],
                'com.android.calendar': ['calendar://'],
                'com.android.deskclock': ['deskclock://', 'alarmclock://'],
                'com.android.settings': ['android.settings://'],
                'com.android.camera': ['camera://'],
                'com.huawei.hmos.camera': ['camera://'],
                'com.huawei.hmos.calendar': ['calendar://'],
                'com.huawei.hmos.settings': ['android.settings://'],
                'com.huawei.hmos.photos': ['photos://', 'gallery://'],
                'com.android.gallery3d': ['gallery://'],
                'com.huawei.hidisk': ['huaweifiles://'],
                'com.android.documentsui': ['files://'],
                'com.huawei.browser': ['huaweibrowser://'],
                'com.android.browser': ['browser://'],
                'com.android.chrome': ['googlechrome://'],
                'com.google.android.chrome': ['googlechrome://'],
                'org.mozilla.firefox': ['firefox://'],
                'com.UCMobile': ['ucbrowser://'],
                'com.tencent.mtt': ['qqbrowser://'],
                'com.mi.globalbrowser': ['mibrowser://'],
                'com.snapchat.android': ['snapchat://'],
                'com.instagram.android': ['instagram://'],
                'com.twitter.android': ['twitter://'],
                'com.facebook.katana': ['fb://'],
                'com.facebook.orca': ['messenger://'],
                'com.whatsapp': ['whatsapp://'],
                'com.line.android': ['line://'],
                'com.kakao.talk': ['kakaotalk://'],
                'com.viber.voip': ['viber://'],
                'com.skype.raider': ['skype://'],
                'com.microsoft.teams': ['teams://'],
                'com.microsoft.outlook': ['ms-outlook://'],
                'com.microsoft.excel': ['ms-excel://'],
                'com.microsoft.word': ['ms-word://'],
                'com.microsoft.powerpoint': ['ms-powerpoint://'],
                'com.microsoft.onenote': ['ms-onenote://'],
                'com.microsoft.bing': ['bing://']
            };

            const schemes = [];

            if (appSchemes[pkg]) {
                appSchemes[pkg].forEach(scheme => {
                    schemes.push(scheme);
                });
            }

            const parts = pkg.split('.');
            if (parts.length >= 2) {
                const lastPart = parts[parts.length - 1];
                const secondLast = parts[parts.length - 2];
                
                schemes.push(`${lastPart}://`);
                schemes.push(`${secondLast}://`);
                schemes.push(`${secondLast}${lastPart}://`);
                schemes.push(`${pkg}://`);
                
                if (secondLast === 'android') {
                    schemes.push(`${lastPart}://`);
                }
                if (secondLast === 'app') {
                    schemes.push(`${lastPart}://`);
                    schemes.push(`${parts[parts.length - 3]}${lastPart}://`);
                }
            }

            schemes.push(`intent://#Intent;action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;package=${pkg};launchFlags=0x10000000;end`);
            schemes.push(`market://details?id=${pkg}`);

            document.getElementById('launchTip').innerHTML = '请点击下方按钮尝试启动<br>如果未打开，请点击"换一种方式"';

            const schemeList = document.getElementById('schemeList');
            schemeList.innerHTML = '';
            schemes.forEach((scheme, index) => {
                const btn = document.createElement('a');
                btn.href = scheme;
                btn.className = 'action-btn scheme-btn';
                btn.textContent = `方式 ${index + 1}: ${scheme.split('://')[0]}://`;
                btn.style.cssText = 'display:block;margin:6px 0;background:#42a5f5;color:white;text-decoration:none;';
                schemeList.appendChild(btn);
            });
        }
        
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 500);
            
            if (packageName) {
                launchApp();
            }
        });

        function toggleManualInput() {
            const manualInput = document.getElementById('manualInput');
            manualInput.style.display = manualInput.style.display === 'none' ? 'block' : 'none';
        }

        function toggleSchemeInput() {
            const schemeInput = document.getElementById('schemeInput');
            schemeInput.style.display = schemeInput.style.display === 'none' ? 'block' : 'none';
        }

        function manualLaunch() {
            const input = document.getElementById('packageInput');
            const manualPackage = input.value.trim();
            if (manualPackage) {
                launchWithPackage(manualPackage);
            }
        }

        function tryCustomScheme() {
            const input = document.getElementById('schemeInputField');
            const customScheme = input.value.trim();
            if (customScheme) {
                document.getElementById('launchTip').textContent = `正在跳转: ${customScheme}`;
                window.location.href = customScheme;
            }
        }
    </script>
</body>
</html>
