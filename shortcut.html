<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>图标伪装 - 快捷方式</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .icon-container {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        .icon-calculator { background: linear-gradient(135deg, #00BCD4, #0097A7); }
        .icon-calendar { background: linear-gradient(135deg, #E53935, #C62828); }
        .icon-notes { background: linear-gradient(135deg, #FFD54F, #FFA000); }
        .icon-clock { background: linear-gradient(135deg, #1565C0, #0D47A1); }
        .icon-weather { background: linear-gradient(135deg, #4FC3F7, #0288D1); }
        .icon-camera { background: linear-gradient(135deg, #424242, #212121); }
        .icon-browser { background: linear-gradient(135deg, #1E88E5, #1565C0); }
        .icon-music { background: linear-gradient(135deg, #7E57C2, #5E35B1); }

        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
            text-align: center;
        }
        .btn {
            display: block;
            width: 100%;
            max-width: 320px;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            text-decoration: none;
            margin-bottom: 10px;
            cursor: pointer;
            border: none;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: #2196F3; color: white; }
        .btn-success { background: #4CAF50; color: white; }
        .btn-warning { background: #FF9800; color: white; }
        .btn-outline { background: #fff; color: #2196F3; border: 2px solid #2196F3; }
        .btn-gray { background: #f5f5f5; color: #333; }

        .tip {
            color: #888;
            font-size: 12px;
            text-align: center;
            line-height: 1.6;
            margin-top: 16px;
            padding: 16px;
            background: #f5f5f5;
            border-radius: 8px;
            max-width: 320px;
        }

        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2196F3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }

        .status-box {
            max-width: 320px;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 14px;
            text-align: center;
        }
        .status-success { background: #e8f5e9; color: #2e7d32; }
        .status-warning { background: #fff3e0; color: #e65100; }
        .status-info { background: #e3f2fd; color: #1565c0; }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <p id="loadingText">正在启动应用...</p>
    </div>

    <div class="icon-container" id="shortcutIcon"></div>
    <h1 id="shortcutTitle">图标伪装</h1>
    <p class="subtitle">点击下方按钮启动应用</p>

    <div id="mainArea" style="width: 100%; max-width: 320px;"></div>

    <p id="launchTip" class="tip" style="display:none;"></p>

    <div class="tip">
        提示：请将此网页添加到桌面，<br>
        点击桌面图标即可快速启动目标应用
    </div>

    <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 10px; width: 100%; max-width: 320px;">
        <button class="btn btn-gray" onclick="toggleManualInput()">
            手动输入包名
        </button>
        <button class="btn btn-gray" onclick="toggleSchemeInput()">
            尝试自定义URL Scheme
        </button>
    </div>

    <div id="manualInput" style="display: none; width: 100%; max-width: 320px; margin-top: 16px;">
        <input type="text" id="packageInput" placeholder="输入包名，如 com.tencent.mm" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; outline: none; margin-bottom: 10px;">
        <button class="btn btn-primary" onclick="manualLaunch()">生成启动方式</button>
    </div>

    <div id="schemeInput" style="display: none; width: 100%; max-width: 320px; margin-top: 16px;">
        <input type="text" id="schemeInputField" placeholder="输入URL Scheme，如 deepseek://" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; outline: none; margin-bottom: 10px;">
        <button class="btn btn-warning" onclick="tryCustomScheme()">尝试此Scheme</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const packageName = params.get('package');
        const iconType = params.get('icon') || 'calculator';
        const appName = params.get('name') || '快捷方式';

        const iconMap = {
            calculator: { emoji: '🧮', class: 'icon-calculator' },
            calendar: { emoji: '📅', class: 'icon-calendar' },
            notes: { emoji: '📝', class: 'icon-notes' },
            clock: { emoji: '⏰', class: 'icon-clock' },
            weather: { emoji: '☀️', class: 'icon-weather' },
            camera: { emoji: '📷', class: 'icon-camera' },
            browser: { emoji: '🌐', class: 'icon-browser' },
            music: { emoji: '🎵', class: 'icon-music' }
        };

        const iconInfo = iconMap[iconType] || iconMap.calculator;
        document.getElementById('shortcutIcon').className = 'icon-container ' + iconInfo.class;
        document.getElementById('shortcutIcon').textContent = iconInfo.emoji;
        document.getElementById('shortcutTitle').textContent = appName;

        // 已知URL Scheme的应用列表
        const knownSchemes = {
            'org.telegram.messenger.web': ['tg://', 'telegram://'],
            'org.telegram.messenger': ['tg://', 'telegram://'],
            'com.tencent.mm': ['weixin://'],
            'com.tencent.mobileqq': ['mqq://'],
            'com.tencent.mobileqq.kitkatomini': ['mqq://'],
            'com.alipay.mobile': ['alipays://'],
            'com.eg.android.AlipayGphone': ['alipays://'],
            'com.taobao.taobao': ['taobao://'],
            'com.taobao.idlefish': ['fleamarket://'],
            'com.tmall.wireless': ['tmall://'],
            'com.ss.android.ugc.aweme': ['snssdk1128://'],
            'com.ss.android.ugc.aweme.lite': ['snssdk1128://'],
            'com.ss.android.article.news': ['snssdk://'],
            'com.ss.android.article.shortvideo': ['snssdk1128://'],
            'com.xingin.xhs': ['xhsdiscover://'],
            'com.sina.weibo': ['sinaweibo://'],
            'com.jingdong.app.mall': ['openapp.jdmobile://'],
            'com.zhihu.android': ['zhihu://'],
            'tv.danmaku.bili': ['bilibili://'],
            'com.smile.gifmaker': ['kwai://'],
            'com.kuaishou.nebula': ['kwai://'],
            'com.baidu.searchbox': ['baiduboxapp://'],
            'com.autonavi.minimap': ['androidamap://'],
            'com.baidu.BaiduMap': ['baidumap://'],
            'com.sankuai.meituan': ['imeituan://'],
            'com.dianping.v1': ['dianping://'],
            'com.sdu.didi.psnger': ['OneTravel://'],
            'com.MobileTicket': ['cn.12306://'],
            'ctrip.android.view': ['ctrip://'],
            'com.netease.cloudmusic': ['orpheus://'],
            'com.tencent.qqmusic': ['qqmusic://'],
            'com.kugou.android': ['kugou://'],
            'cn.kuwo.player': ['kwmusic://'],
            'com.netease.mail': ['mailmaster://'],
            'cn.wps.moffice_eng': ['wpsmoffice://'],
            'com.alibaba.android.rimet': ['dingtalk://'],
            'com.tencent.wework': ['wxwork://'],
            'com.ss.android.lark': ['sslocal://'],
            'com.xunmeng.pinduoduo': ['pinduoduo://'],
            'com.bytedance.tiktok': ['tiktok://'],
            'com.google.android.youtube': ['vnd.youtube://'],
            'com.google.android.apps.maps': ['googlemaps://'],
            'com.google.android.gm': ['gmail://'],
            'com.google.android.calendar': ['google.calendar://'],
            'com.google.android.apps.photos': ['google.photos://'],
            'com.google.android.apps.translate': ['google.translate://'],
            'com.hunantv.imgo.activity': ['mgtv://'],
            'com.iflytek.inputmethod': ['iflytek://'],
            'com.baidu.input': ['baiduinput://'],
            'com.sohu.sohuvideo': ['sohuvideo://'],
            'com.youku.phone': ['youku://'],
            'com.qiyi.video': ['iqiyi://'],
            'com.tencent.qqlive': ['tenvideo://'],
            'com.huawei.himovie': ['huaweivideo://'],
            'com.huawei.music': ['huaweimusic://'],
            'com.miui.player': ['miuimusic://'],
            'com.miui.video': ['miuivideo://'],
            'com.miui.calculator': ['miuicalculator://'],
            'com.miui.notes': ['miuinotes://'],
            'com.miui.weather2': ['miuiweather://'],
            'com.android.calendar': ['content://com.android.calendar'],
            'com.android.deskclock': ['deskclock://'],
            'com.android.settings': ['android.settings://'],
            'com.android.camera': ['camera://'],
            'com.huawei.hmos.camera': ['camera://'],
            'com.huawei.hmos.calendar': ['content://com.android.calendar'],
            'com.huawei.hmos.settings': ['android.settings://'],
            'com.huawei.hmos.photos': ['photos://'],
            'com.android.gallery3d': ['android.gallery://'],
            'com.huawei.hidisk': ['huaweifiles://'],
            'com.android.documentsui': ['android.documentsui://'],
            'com.huawei.browser': ['huaweibrowser://'],
            'com.android.browser': ['browser://'],
            'com.android.chrome': ['googlechrome://'],
            'com.google.android.chrome': ['googlechrome://'],
            'org.mozilla.firefox': ['firefox://'],
            'com.UCMobile': ['ucbrowser://'],
            'com.tencent.mtt': ['qqbrowser://'],
            'com.mi.globalbrowser': ['mibrowser://'],
            'com.snapchat.android': ['snapchat://'],
            'com.instagram.android': ['instagram://'],
            'com.twitter.android': ['twitter://'],
            'com.facebook.katana': ['fb://'],
            'com.facebook.orca': ['messenger://'],
            'com.whatsapp': ['whatsapp://'],
            'com.line.android': ['line://'],
            'com.kakao.talk': ['kakaotalk://'],
            'com.viber.voip': ['viber://'],
            'com.skype.raider': ['skype://'],
            'com.microsoft.teams': ['teams://'],
            'com.microsoft.outlook': ['ms-outlook://'],
            'com.microsoft.bing': ['bing://']
        };

        function launchApp() {
            if (!packageName) {
                alert('请指定包名');
                return;
            }
            launchWithPackage(packageName);
        }

        function launchWithPackage(pkg) {
            const loading = document.getElementById('loading');
            const mainArea = document.getElementById('mainArea');
            loading.classList.add('hidden');
            mainArea.innerHTML = '';

            // 1. 检查是否有已知的URL Scheme
            if (knownSchemes[pkg]) {
                const scheme = knownSchemes[pkg][0];
                const statusBox = document.createElement('div');
                statusBox.className = 'status-box status-success';
                statusBox.textContent = '已找到应用启动方式，正在启动...';
                mainArea.appendChild(statusBox);

                const launchBtn = document.createElement('a');
                launchBtn.href = scheme;
                launchBtn.className = 'btn btn-primary';
                launchBtn.textContent = '点击启动应用';
                mainArea.appendChild(launchBtn);

                // 自动尝试启动
                setTimeout(() => {
                    window.location.href = scheme;
                }, 500);

                // 显示"未打开？"提示
                const tip = document.createElement('div');
                tip.className = 'status-box status-warning';
                tip.innerHTML = '如果没有自动打开，请点击上方按钮<br>或者点击下方"打开应用市场"';
                tip.style.marginTop = '12px';
                mainArea.appendChild(tip);

                // 应用市场兜底
                const marketBtn = document.createElement('a');
                marketBtn.href = 'market://details?id=' + pkg;
                marketBtn.className = 'btn btn-outline';
                marketBtn.textContent = '打开应用市场';
                marketBtn.style.marginTop = '6px';
                mainArea.appendChild(marketBtn);
                return;
            }

            // 2. 未知应用 - 生成尝试列表
            const statusBox = document.createElement('div');
            statusBox.className = 'status-box status-info';
            statusBox.textContent = '该应用未注册URL Scheme，请尝试以下方式';
            mainArea.appendChild(statusBox);

            // 自动生成的scheme
            const parts = pkg.split('.');
            const autoSchemes = [];
            if (parts.length >= 2) {
                const lastPart = parts[parts.length - 1];
                const secondLast = parts[parts.length - 2];
                autoSchemes.push(`${lastPart}://`);
                autoSchemes.push(`${secondLast}://`);
                autoSchemes.push(`${secondLast}${lastPart}://`);
                autoSchemes.push(`${pkg}://`);
            }

            // 显示自动生成的按钮
            autoSchemes.forEach((scheme, index) => {
                const btn = document.createElement('a');
                btn.href = scheme;
                btn.className = 'btn btn-primary';
                btn.textContent = `尝试方式 ${index + 1}: ${scheme.split('://')[0]}://`;
                btn.style.marginBottom = '6px';
                mainArea.appendChild(btn);
            });

            // 分隔提示
            const tipBox = document.createElement('div');
            tipBox.className = 'status-box status-warning';
            tipBox.innerHTML = '如果以上方式都无法打开，<br>请点击下方按钮跳转应用市场<br>在应用市场点击"打开"按钮即可';
            tipBox.style.marginTop = '8px';
            mainArea.appendChild(tipBox);

            // 应用市场兜底
            const marketBtn = document.createElement('a');
            marketBtn.href = 'market://details?id=' + pkg;
            marketBtn.className = 'btn btn-success';
            marketBtn.textContent = '跳转应用市场打开';
            mainArea.appendChild(marketBtn);
        }

        function toggleManualInput() {
            const el = document.getElementById('manualInput');
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        function toggleSchemeInput() {
            const el = document.getElementById('schemeInput');
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        function manualLaunch() {
            const input = document.getElementById('packageInput');
            const pkg = input.value.trim();
            if (pkg) {
                launchWithPackage(pkg);
            }
        }

        function tryCustomScheme() {
            const input = document.getElementById('schemeInputField');
            const scheme = input.value.trim();
            if (scheme) {
                window.location.href = scheme;
            }
        }

        // 页面加载后自动启动
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
                if (packageName) {
                    launchApp();
                }
            }, 500);
        });
    </script>
</body>
</html>
